name: PR Notify — Phase 2a Content

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [main]
  issue_comment:
    types: [created]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run for content PRs or comments on content PRs
    if: |
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'content/week-')) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && github.event.issue.pull_request.merged_at == null)

    steps:
      - name: PR Opened or Updated
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        shell: bash
        run: |
          MSG='📬 **PR ${{ github.event.action == 'opened' && 'Created' || 'Updated' }} — Phase 2a Python**

          **PR:** #${{ github.event.pull_request.number }}
          **Title:** ${{ github.event.pull_request.title }}
          **Branch:** `${{ github.event.pull_request.head.ref }}`

          🔗 ${{ github.event.pull_request.html_url }}

          **Actions:**
          • Merge to publish content
          • Comment `/rework` to request changes
          • Close to cancel'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.CONTENT_PIPELINE_TOPIC_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=$MSG"

      - name: PR Merged → Notify Facilitators
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        shell: bash
        run: |
          MSG='🎉 **Phase 2a Python — Content Published!**

          **PR:** #${{ github.event.pull_request.number }}
          **Title:** ${{ github.event.pull_request.title }}
          **Merged by:** ${{ github.event.pull_request.merged_by.login }}

          ✅ Content is now live for students on GitHub.
          📂 Solutions available on Google Drive.'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_GROUP_CHAT_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=$MSG"

      - name: PR Merged → Update NocoDB
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        shell: bash
        run: |
          curl -s -X PATCH "https://nocodb.aiautom8or.com/api/v2/tables/${{ secrets.NOCODB_WEEKLY_TABLE_ID }}/records" \
            -H "xc-token: ${{ secrets.NOCODB_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "records": [{
              "Id": "${{ secrets.NOCODB_WEEK_2_RECORD_ID }}",
              "status": "published"
            }]
          }
          EOF
          )"

      - name: PR Closed (not merged)
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
        shell: bash
        run: |
          MSG='❌ **PR Closed — Not Merged**

          **PR:** #${{ github.event.pull_request.number }}
          **Title:** ${{ github.event.pull_request.title }}

          This PR was closed without merging. Run the generation pipeline again to create a new PR.'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.CONTENT_PIPELINE_TOPIC_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=$MSG"

      - name: Rework Comment Detected
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/rework')
        shell: bash
        run: |
          MSG='🔄 **Rework Requested — PR #${{ github.event.issue.number }}**

          **Comment by:** ${{ github.event.comment.user.login }}
          **PR:** ${{ github.event.issue.html_url }}

          > ${{ github.event.comment.body }}'
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.CONTENT_PIPELINE_TOPIC_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=$MSG"
