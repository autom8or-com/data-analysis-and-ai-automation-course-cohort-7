name: PR Commands — Phase 2a Content Review

# Handles /approve, /reject, /rework comments on Phase 2a content PRs.
# /approve  — squash merge + delete branch (pure bash)
# /reject   — close PR + delete branch + Telegram (pure bash)
# /rework   — calls the "Phase 2a Python — Content Rework" Claude Routine via
#             its API trigger endpoint. The Routine runs on Anthropic cloud and
#             applies targeted notebook improvements based on the reviewer's notes.
#             Requires REWORK_ROUTINE_URL and REWORK_ROUTINE_TOKEN secrets.
#             (GitHub event triggers in Routines do not support issue_comment events;
#              the API trigger pattern is the correct approach.)
#
# ── Why this workflow has a separate `gate` job ───────────────────────────────
# These commands are DESTRUCTIVE (merge / close / dispatch) and run with a
# privileged PAT, so the commenter's own GitHub permissions are NOT enforced by
# GitHub — the PAT acts regardless of who commented. We must enforce two things
# ourselves, structurally, so that no comment can trigger a command by accident:
#
#   1. EXACT SHAPE — the command must be the first whitespace-delimited token of
#      the FIRST LINE of the comment. Prose, headings, bullet lists, quoted
#      replies, or any text that merely *mentions* `/approve` cannot match.
#      (A substring/`contains` or even `startsWith` check is not enough: an
#      automated summary that documents the commands, or a comment that begins
#      "/approve was used last week…", would still fire.)
#
#   2. REAL AUTHORIZATION — the commenter must be a human (not a Bot account)
#      with write/admin access, verified live against the repo. This closes the
#      hole where ANY commenter (a student with read access, the pipeline bot,
#      an external drive-by) could merge simply by typing the command.
#
# The `gate` job emits `command` (empty unless BOTH checks pass) and `argument`.
# The `run-command` job acts only when `gate.outputs.command` is non-empty.

on:
  issue_comment:
    types: [created]

jobs:
  # ── Gate: parse the command shape + authorize the commenter ───────
  gate:
    # Cheap pre-filter only — the authoritative checks happen in the step below.
    # `contains` here just avoids spinning a runner for ordinary chit-chat; it is
    # deliberately NOT trusted as the trigger (the incident comment would pass
    # this pre-filter and then be rejected by the exact-shape + auth checks).
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.issue.title, 'Phase 2a Python') &&
      (
        contains(github.event.comment.body, '/approve') ||
        contains(github.event.comment.body, '/reject') ||
        contains(github.event.comment.body, '/rework')
      )
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.gate.outputs.command }}
      argument: ${{ steps.gate.outputs.argument }}
    env:
      GH_TOKEN: ${{ secrets.CONTENT_PIPELINE_PAT }}
    steps:
      - name: Parse command shape and authorize commenter
        id: gate
        env:
          BODY: ${{ github.event.comment.body }}
          ACTOR: ${{ github.event.comment.user.login }}
          ACTOR_TYPE: ${{ github.event.comment.user.type }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eu

          # Default: no command. Any rejection path below leaves this empty,
          # so the run-command job is skipped.
          echo "command=" >> "$GITHUB_OUTPUT"

          # ── 1. Exact shape: first token of the FIRST line, no pipes ──
          # Strip everything from the first newline onward, then a trailing CR.
          FIRST_LINE="${BODY%%$'\n'*}"
          FIRST_LINE="${FIRST_LINE%$'\r'}"
          # Split first line into <token> <rest>. read collapses leading spaces.
          read -r FIRST_TOKEN ARG <<< "$FIRST_LINE" || true

          case "$FIRST_TOKEN" in
            /approve) CMD="approve" ;;
            /reject)  CMD="reject"  ;;
            /rework)  CMD="rework"  ;;
            *)
              echo "::notice::No leading slash-command on the first line — ignoring."
              exit 0
              ;;
          esac

          # ── 2. Authorization: human with write/admin, never a Bot ────
          if [ "${ACTOR_TYPE:-User}" = "Bot" ]; then
            echo "::notice::Ignoring /${CMD} from bot account '${ACTOR}' — bots cannot issue review commands."
            exit 0
          fi

          PERM=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" \
                   --jq '.permission' 2>/dev/null || echo "none")
          case "$PERM" in
            admin|write)
              echo "::notice::/${CMD} authorized for '${ACTOR}' (permission: ${PERM})."
              ;;
            *)
              echo "::notice::Ignoring /${CMD} from '${ACTOR}' — insufficient permission (${PERM}). Requires write or admin."
              exit 0
              ;;
          esac

          # ── Both checks passed: emit the command and its argument ────
          # Overwrite the earlier empty `command=` with the real value.
          echo "command=${CMD}" >> "$GITHUB_OUTPUT"
          {
            echo "argument<<__PR_CMD_ARG__"
            echo "${ARG}"
            echo "__PR_CMD_ARG__"
          } >> "$GITHUB_OUTPUT"

  # ── Run: act only when the gate authorized a real command ─────────
  run-command:
    needs: gate
    if: needs.gate.outputs.command != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.CONTENT_PIPELINE_PAT }}
      PR_NUMBER: ${{ github.event.issue.number }}
      ACTOR: ${{ github.event.comment.user.login }}
      COMMAND: ${{ needs.gate.outputs.command }}
      ARGUMENT: ${{ needs.gate.outputs.argument }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONTENT_PIPELINE_PAT }}

      # ── /approve — squash merge and delete branch ─────────────
      - name: Handle approve
        if: needs.gate.outputs.command == 'approve'
        shell: bash
        run: |
          TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')

          echo "Approving PR #${PR_NUMBER}: ${TITLE}"

          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --subject "${TITLE}"

          echo "✅ PR #${PR_NUMBER} merged and branch deleted by ${ACTOR}"

      # ── /reject — close PR + delete branch + Telegram ─────────
      - name: Handle reject
        if: needs.gate.outputs.command == 'reject'
        shell: bash
        run: |
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')

          REASON="${ARGUMENT:-No reason given}"

          echo "Rejecting PR #${PR_NUMBER} on branch ${BRANCH}. Reason: ${REASON}"

          CLOSE_COMMENT=$'❌ **Rejected** by @'"${ACTOR}"$'\n\n**Reason:** '"${REASON}"$'\n\nThe branch `'"${BRANCH}"$'` has been deleted. Run the pipeline again to regenerate this week'"'"'s content.'
          gh pr close "$PR_NUMBER" --comment "$CLOSE_COMMENT"

          git push origin --delete "$BRANCH" \
            && echo "Branch ${BRANCH} deleted" \
            || echo "Branch ${BRANCH} already deleted or not found"

          MSG=$'❌ *PR Rejected — Phase 2a Python*\n\n*PR:* #'"${PR_NUMBER}"$'\n*Branch:* `'"${BRANCH}"$'`\n*Rejected by:* @'"${ACTOR}"$'\n*Reason:* '"${REASON}"$'\n\nBranch deleted. Run /python-content-generator to regenerate.'
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}" \
            -d "message_thread_id=${{ secrets.CONTENT_PIPELINE_TOPIC_ID }}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            || echo "Telegram notification failed (non-blocking)"

      # ── /rework — call Claude Routine API endpoint ────────────
      - name: Handle rework
        if: needs.gate.outputs.command == 'rework'
        shell: bash
        run: |
          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')

          INSTRUCTIONS="${ARGUMENT:-No specific instructions provided — apply general quality improvements}"

          echo "Dispatching /rework for PR #${PR_NUMBER} (${BRANCH}) to Claude Routine..."

          TEXT=$'/rework trigger from PR #'"${PR_NUMBER}"$'\n\nPR: #'"${PR_NUMBER}"$'\nBranch: '"${BRANCH}"$'\nTitle: '"${TITLE}"$'\nReviewer: @'"${ACTOR}"$'\n\nRework instructions:\n'"${INSTRUCTIONS}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.REWORK_ROUTINE_URL }}" \
            -H "Authorization: Bearer ${{ secrets.REWORK_ROUTINE_TOKEN }}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\": $(echo "$TEXT" | jq -Rs .)}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ]; then
            SESSION_URL=$(echo "$BODY" | jq -r '.claude_code_session_url // empty')

            REWORK_COMMENT=$'🔧 **Rework triggered** by @'"${ACTOR}"$'\n\nClaude is applying your feedback now. [Watch the session]('"${SESSION_URL}"$')\n\nFeedback: *'"${INSTRUCTIONS}"$'*'
            gh pr comment "$PR_NUMBER" --body "$REWORK_COMMENT"

            MSG=$'🔧 *Rework In Progress — Phase 2a Python*\n\n*PR:* #'"${PR_NUMBER}"$' — '"${TITLE}"$'\n*Triggered by:* @'"${ACTOR}"$'\n*Feedback:* '"${INSTRUCTIONS}"$'\n\nClaude is applying the rework now. The PR will update automatically when done.'
            curl -s -X POST \
              "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_REVIEWER_CHAT_ID }}" \
              -d "message_thread_id=${{ secrets.CONTENT_PIPELINE_TOPIC_ID }}" \
              -d "parse_mode=Markdown" \
              --data-urlencode "text=${MSG}" \
              || echo "Telegram notification failed (non-blocking)"

            echo "✅ Rework routine fired. Session: ${SESSION_URL}"
          else
            echo "⚠ Routine API call failed (HTTP ${HTTP_CODE}): ${BODY}"
            gh pr comment "$PR_NUMBER" \
              --body "⚠️ **Rework trigger failed** (HTTP ${HTTP_CODE}) — check the \`REWORK_ROUTINE_URL\` and \`REWORK_ROUTINE_TOKEN\` secrets, or run \`/python-content-generator\` manually on the branch \`${BRANCH}\`."
          fi

      # ── Acknowledge with emoji reaction ───────────────────────
      - name: React to command comment
        if: always()
        env:
          COMMENT_ID: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          case "$COMMAND" in
            approve) EMOJI="rocket" ;;
            rework)  EMOJI="wrench" ;;
            *)       EMOJI="x" ;;
          esac

          gh api \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -X POST \
            -f "content=${EMOJI}" \
            || true
